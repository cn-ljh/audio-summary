<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音频转录和摘要系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 登录界面 -->
    <div id="loginSection" class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0 text-center">🎵 音频转录系统</h4>
                    </div>
                    <div class="card-body">
                        <div id="authMessage" class="alert d-none"></div>
                        
                        <!-- 登录表单 -->
                        <div id="loginForm">
                            <h5 class="mb-3">登录</h5>
                            <form id="signInForm">
                                <div class="mb-3">
                                    <label for="signInEmail" class="form-label">邮箱</label>
                                    <input type="email" class="form-control" id="signInEmail" required>
                                </div>
                                <div class="mb-3">
                                    <label for="signInPassword" class="form-label">密码</label>
                                    <input type="password" class="form-control" id="signInPassword" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">登录</button>
                            </form>
                            <div class="text-center mt-3">
                                <a href="#" id="showSignUp">没有账号？注册</a>
                            </div>
                        </div>
                        
                        <!-- 注册表单 -->
                        <div id="signUpForm" class="d-none">
                            <h5 class="mb-3">注册</h5>
                            <form id="registerForm">
                                <div class="mb-3">
                                    <label for="signUpName" class="form-label">姓名</label>
                                    <input type="text" class="form-control" id="signUpName" required>
                                </div>
                                <div class="mb-3">
                                    <label for="signUpEmail" class="form-label">邮箱</label>
                                    <input type="email" class="form-control" id="signUpEmail" required>
                                </div>
                                <div class="mb-3">
                                    <label for="signUpPassword" class="form-label">密码（至少8位，包含大小写字母和数字）</label>
                                    <input type="password" class="form-control" id="signUpPassword" required>
                                </div>
                                <button type="submit" class="btn btn-success w-100">注册</button>
                            </form>
                            <div class="text-center mt-3">
                                <a href="#" id="showSignIn">已有账号？登录</a>
                            </div>
                        </div>
                        
                        <!-- 验证码表单 -->
                        <div id="confirmForm" class="d-none">
                            <h5 class="mb-3">验证邮箱</h5>
                            <p class="text-muted">请查收邮箱中的验证码</p>
                            <form id="verifyForm">
                                <div class="mb-3">
                                    <label for="confirmCode" class="form-label">验证码</label>
                                    <input type="text" class="form-control" id="confirmCode" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">验证</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 主应用界面 -->
    <div id="appSection" class="d-none">
        <!-- 导航栏 -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container-fluid">
                <span class="navbar-brand">🎵 音频转录系统</span>
                <div class="navbar-nav ms-auto">
                    <span class="nav-item text-white me-3" id="userInfo"></span>
                    <button class="btn btn-outline-light btn-sm" id="signOutBtn">退出</button>
                </div>
            </div>
        </nav>

        <div class="container mt-4">
            <!-- Upload Section -->
            <div class="card mb-4">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">上传音频文件</h5>
                </div>
                <div class="card-body">
                    <form id="uploadForm" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label for="audioFile" class="form-label">选择音频文件 (支持 mp3, mp4, wav, m4a, flac, ogg, webm)</label>
                            <input type="file" class="form-control" id="audioFile" name="audio" accept="audio/*" required>
                        </div>
                        <button type="submit" class="btn btn-primary" id="uploadBtn">
                            <span id="uploadBtnText">上传并处理</span>
                            <span id="uploadSpinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status" aria-hidden="true"></span>
                        </button>
                    </form>
                    
                    <!-- Upload Progress -->
                    <div id="uploadProgress" class="mt-3 d-none">
                        <div class="progress">
                            <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
                        </div>
                        <p id="progressText" class="text-center mt-2"></p>
                    </div>
                    
                    <!-- Upload Result -->
                    <div id="uploadResult" class="mt-3"></div>
                </div>
            </div>
            
            <!-- Current Task Section -->
            <div id="currentTaskSection" class="card mb-4 d-none">
                <div class="card-header bg-info text-white">
                    <h5 class="mb-0">当前任务状态</h5>
                </div>
                <div class="card-body">
                    <div id="currentTask"></div>
                </div>
            </div>
            
            <!-- Tasks History -->
            <div class="card">
                <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">历史任务</h5>
                    <button class="btn btn-sm btn-light" onclick="loadTasks()">刷新</button>
                </div>
                <div class="card-body">
                    <div id="tasksList"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 音频播放器模态框 -->
    <div class="modal fade" id="audioPlayerModal" tabindex="-1" aria-labelledby="audioPlayerModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="audioPlayerModalLabel">音频播放</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0">
                    <div id="audioPlayerContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- AWS SDK for Cognito -->
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1000.0.min.js"></script>
    <!-- Amazon Cognito Identity SDK -->
    <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.7/dist/amazon-cognito-identity.min.js"></script>
    
    <!-- Cognito 配置 -->
    <script>
        // ⚠️ 部署后请替换为你自己的配置（从 CloudFormation Outputs 获取）
        const COGNITO_CONFIG = {
            region: 'YOUR_REGION',                    // e.g. 'us-west-2'
            userPoolId: 'YOUR_USER_POOL_ID',          // e.g. 'us-west-2_xxxxxxxx'
            clientId: 'YOUR_CLIENT_ID'                // e.g. '1234567890abcdef'
        };
        
        // API 端点配置（从 CloudFormation Outputs 获取）
        const API_BASE_URL = 'YOUR_API_ENDPOINT';    // e.g. 'https://xxxxx.execute-api.us-west-2.amazonaws.com/prod'
    </script>
    
    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
