AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Audio Transcription Serverless Service

# 全局配置
Globals:
  Function:
    Timeout: 300
    MemorySize: 512
    Runtime: python3.12
    Architectures:
      - arm64
    Environment:
      Variables:
        DYNAMODB_TABLE: !Ref TasksTable
        AUDIO_BUCKET: !Ref AudioBucket
        COGNITO_USER_POOL_ID: !Ref CognitoUserPool
        POWERTOOLS_SERVICE_NAME: audio-transcribe
        LOG_LEVEL: INFO
    Tracing: Active

Parameters:
  Stage:
    Type: String
    Default: prod
    Description: Deployment stage

Resources:
  # ==========================================
  # S3 Bucket for Audio Files
  # ==========================================
  AudioBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'audio-transcribe-${AWS::AccountId}-${AWS::Region}'
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST]
            AllowedOrigins: ['*']
            MaxAge: 3600
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldAudio
            Status: Enabled
            ExpirationInDays: 90
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 30

  # ==========================================
  # DynamoDB Table for Tasks
  # ==========================================
  TasksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'audio-transcribe-tasks-${Stage}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: task_id
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: task_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: user-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # ==========================================
  # Cognito User Pool
  # ==========================================
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub 'audio-transcribe-${Stage}'
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: email
          Required: true
          Mutable: false
        - Name: name
          Required: false
          Mutable: true
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub 'audio-transcribe-client-${Stage}'
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AllowedOAuthFlows:
        - implicit
        - code
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      CallbackURLs:
        - http://localhost:3000
        - !Sub 'https://${CloudFrontDistribution.DomainName}'
      LogoutURLs:
        - http://localhost:3000
        - !Sub 'https://${CloudFrontDistribution.DomainName}'
      SupportedIdentityProviders:
        - COGNITO

  # ==========================================
  # API Gateway
  # ==========================================
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Stage
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowMethods: "'GET,POST,OPTIONS'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt CognitoUserPool.Arn
      TracingEnabled: true

  # ==========================================
  # Lambda Functions
  # ==========================================
  
  # Upload Handler
  UploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'audio-transcribe-upload-${Stage}'
      CodeUri: functions/upload/
      Handler: app.lambda_handler
      Environment:
        Variables:
          AUDIO_BUCKET: !Ref AudioBucket
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref AudioBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref TasksTable
        - Statement:
            - Effect: Allow
              Action:
                - transcribe:StartTranscriptionJob
              Resource: '*'
      Events:
        Upload:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /upload
            Method: POST

  # Task Query Function
  TaskQueryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'audio-transcribe-task-query-${Stage}'
      CodeUri: functions/task-query/
      Handler: app.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TasksTable
      Events:
        GetTask:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /task/{task_id}
            Method: GET
        ListTasks:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /tasks
            Method: GET

  # Get Audio Presigned URL Function
  # Start Transcribe Function
  StartTranscribeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'audio-transcribe-start-${Stage}'
      CodeUri: functions/start-transcribe/
      Handler: app.lambda_handler
      Environment:
        Variables:
          AUDIO_BUCKET: !Ref AudioBucket
          DYNAMODB_TABLE: !Ref TasksTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TasksTable
        - S3ReadPolicy:
            BucketName: !Ref AudioBucket
        - Statement:
            - Effect: Allow
              Action:
                - transcribe:StartTranscriptionJob
                - transcribe:GetTranscriptionJob
              Resource: '*'
      Events:
        StartTranscribe:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /start-transcribe
            Method: POST

  GetAudioUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'audio-transcribe-get-audio-url-${Stage}'
      CodeUri: functions/get-audio-url/
      Handler: app.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TasksTable
        - S3ReadPolicy:
            BucketName: !Ref AudioBucket
      Events:
        GetAudioUrl:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /task/{task_id}/audio-url
            Method: GET

  # Transcribe Processor Function
  TranscribeProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'audio-transcribe-processor-${Stage}'
      CodeUri: functions/transcribe-processor/
      Handler: app.lambda_handler
      Timeout: 900
      MemorySize: 1024
      Environment:
        Variables:
          AUDIO_BUCKET: !Ref AudioBucket
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref AudioBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref TasksTable
        - Statement:
            - Effect: Allow
              Action:
                - transcribe:GetTranscriptionJob
              Resource: '*'
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/*'
      Events:
        TranscribeComplete:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - aws.transcribe
              detail-type:
                - Transcribe Job State Change
              detail:
                TranscriptionJobStatus:
                  - COMPLETED
                  - FAILED

  # ==========================================
  # CloudFront for Frontend
  # ==========================================
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'audio-transcribe-frontend-${AWS::AccountId}'
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  CloudFrontOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub 'OAI for audio-transcribe-${Stage}'

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              CanonicalUser: !GetAtt CloudFrontOAI.S3CanonicalUserId
            Action: 's3:GetObject'
            Resource: !Sub '${FrontendBucket.Arn}/*'

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub 'origin-access-identity/cloudfront/${CloudFrontOAI}'
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
        PriceClass: PriceClass_100

# ==========================================
# Outputs
# ==========================================
Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Stage}'
    Export:
      Name: !Sub '${AWS::StackName}-ApiEndpoint'

  CloudFrontURL:
    Description: CloudFront Distribution URL
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub '${AWS::StackName}-CloudFrontURL'

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPool
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolId'

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref CognitoUserPoolClient
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolClientId'

  AudioBucket:
    Description: S3 Bucket for Audio Files
    Value: !Ref AudioBucket
    Export:
      Name: !Sub '${AWS::StackName}-AudioBucket'

  TasksTable:
    Description: DynamoDB Table Name
    Value: !Ref TasksTable
    Export:
      Name: !Sub '${AWS::StackName}-TasksTable'
